<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:var(--font-sans,'Anthropic Sans',sans-serif);
  background:var(--color-background-tertiary,#f5f4f0);
  color:var(--color-text-primary,#1a1a18);
  font-size:13px;
}

#app{
  display:grid;
  grid-template-rows:auto 1fr auto;
  min-height:100vh;
}

/* HEADER */
#header{
  background:#fff;
  border-bottom:0.5px solid #ddd;
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:12px;
}

/* MAIN LAYOUT */
#main{
  display:grid;
  grid-template-columns:1fr 300px;
  height:100%;
}

/* CENTER BOARD AREA (FIXED FEELING) */
#board-area{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:16px;
  overflow:hidden;
  background:#f0ede8;
}

/* =========================
   BIGGER MAIN BOARD
   ========================= */

#board{
  position:relative;
  width:1200px;
  height:900px;
  background:linear-gradient(135deg,#2d4a2d 0%,#1a3a1a 100%);
  border-radius:12px;
  border:2px solid #1a2e1a;
}

/* CANVAS MATCHES BOARD EXACTLY */
#links-canvas{
  position:absolute;
  top:0;
  left:0;
  width:1200px;
  height:900px;
  pointer-events:none;
  z-index:1;
}

/* LOCATIONS */
.location{position:absolute;cursor:pointer;z-index:2}

.loc-box{
  background:rgba(255,255,255,0.92);
  border:1.5px solid #555;
  border-radius:6px;
  padding:3px 6px;
  font-size:10px;
  text-align:center;
  min-width:60px;
}

.loc-box:hover{
  background:#fff;
  border-color:#333;
  transform:scale(1.05);
}

.loc-slots{
  display:flex;
  gap:2px;
  justify-content:center;
  margin-top:2px;
}

/* SIDEBAR */
#sidebar{
  background:#fff;
  border-left:0.5px solid #ddd;
  padding:10px;
  overflow-y:auto;
}

/* ACTION BAR */
#action-bar{
  background:#fff;
  border-top:0.5px solid #ddd;
  padding:8px 12px;
  display:flex;
  gap:6px;
  align-items:center;
}

.action-btn{
  padding:6px 10px;
  border:0.5px solid #ccc;
  border-radius:6px;
  background:transparent;
  cursor:pointer;
}

.action-btn:hover{
  background:#eee;
}

</style>
</head>

<body>
<div id="app">

<div id="header">
  <div style="font-size:16px;font-weight:600;">BRASS: BIRMINGHAM</div>
  <span id="era-badge">Canal Era</span>
</div>

<div id="main">

<!-- BOARD -->
<div id="board-area">
  <div id="board">
    <canvas id="links-canvas" width="1200" height="900"></canvas>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div>Players / Cards / Info Panel</div>
</div>

</div>

<!-- ACTION BAR -->
<div id="action-bar">
  <button class="action-btn">Build</button>
  <button class="action-btn">Network</button>
  <button class="action-btn">Develop</button>
  <button class="action-btn">Sell</button>
</div>

</div>

<script>

/* =========================
   BOARD SIZE FIX (IMPORTANT)
   ========================= */

const BOARD_W = 1200;
const BOARD_H = 900;

/* DRAW CONNECTIONS (SCALED SAFE) */
function drawLinks(){
  const canvas=document.getElementById('links-canvas');
  const ctx=canvas.getContext('2d');

  ctx.clearRect(0,0,BOARD_W,BOARD_H);

  CONNECTIONS.forEach(([a,b])=>{
    const la=LOCATIONS.find(l=>l.id===a);
    const lb=LOCATIONS.find(l=>l.id===b);
    if(!la||!lb) return;

    ctx.beginPath();
    ctx.moveTo(la.x,la.y);
    ctx.lineTo(lb.x,lb.y);
    ctx.strokeStyle='rgba(255,255,255,0.15)';
    ctx.stroke();
  });

  G.players.forEach(p=>{
    p.links.forEach(link=>{
      const la=LOCATIONS.find(l=>l.id===link.from);
      const lb=LOCATIONS.find(l=>l.id===link.to);
      if(!la||!lb) return;

      ctx.beginPath();
      ctx.moveTo(la.x,la.y);
      ctx.lineTo(lb.x,lb.y);
      ctx.strokeStyle=PLAYER_COLORS[p.id];
      ctx.lineWidth=2;
      ctx.stroke();
    });
  });

  /* CLICK MAPPING FIX */
  canvas.onclick=(e)=>{
    const rect=canvas.getBoundingClientRect();

    const mx=(e.clientX-rect.left)*(BOARD_W/rect.width);
    const my=(e.clientY-rect.top)*(BOARD_H/rect.height);

    let best=null,bestDist=20;

    CONNECTIONS.forEach(([a,b])=>{
      const la=LOCATIONS.find(l=>l.id===a);
      const lb=LOCATIONS.find(l=>l.id===b);
      if(!la||!lb) return;

      const dx=lb.x-la.x,dy=lb.y-la.y;
      const len2=dx*dx+dy*dy;

      const t=Math.max(0,Math.min(1,
        ((mx-la.x)*dx+(my-la.y)*dy)/len2
      ));

      const px=la.x+t*dx;
      const py=la.y+t*dy;

      const dist=Math.sqrt((mx-px)**2+(my-py)**2);
      if(dist<bestDist){
        bestDist=dist;
        best=[a,b];
      }
    });

    if(best) clickConnection(best[0],best[1]);
  };
}

</script>

</body>
</html>
