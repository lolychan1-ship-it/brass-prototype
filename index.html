<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,'Anthropic Sans',sans-serif);background:var(--color-background-tertiary,#f5f4f0);color:var(--color-text-primary,#1a1a18);font-size:13px}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
#app{display:grid;grid-template-rows:auto 1fr auto;min-height:600px;max-height:820px}

#header{background:var(--color-background-primary,#fff);border-bottom:0.5px solid var(--color-border-tertiary);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.era-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.era-canal{background:#E1F5EE;color:#0F6E56}
.era-rail{background:#FAEEDA;color:#854F0B}
#round-info{font-size:12px;color:var(--color-text-secondary);margin-left:auto}

#main{display:grid;grid-template-columns:1fr 300px;overflow:hidden}
#board-area{overflow:auto;padding:12px;background:var(--color-background-secondary,#f0ede8)}

/* ✅ UPDATED BOARD SIZE */
#board{
  position:relative;
  width:900px;
  min-height:675px;
  background:linear-gradient(135deg,#2d4a2d 0%,#1a3a1a 100%);
  border-radius:12px;
  border:2px solid #1a2e1a;
}

#links-canvas{
  position:absolute;
  top:0;
  left:0;
  width:900px;
  height:675px;
  pointer-events:none;
  z-index:1;
}

.location{position:absolute;cursor:pointer;z-index:2}
.loc-box{background:rgba(255,255,255,0.92);border:1.5px solid #555;border-radius:6px;padding:3px 6px;font-size:10px;font-weight:500;text-align:center;white-space:nowrap;transition:all .15s;min-width:60px}
.loc-box:hover{background:#fff;border-color:#333;transform:scale(1.05)}
.loc-box.has-tile{border-color:#c0a060}
.loc-name{font-size:9px;color:#555;line-height:1.2}
.loc-slots{display:flex;gap:2px;margin-top:2px;justify-content:center;flex-wrap:wrap}

.slot{width:14px;height:14px;border-radius:2px;border:1px solid #aaa;font-size:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#f5f5f0}
.slot.p0{background:#ddeeff;border-color:#4488cc}
.slot.p1{background:#ffeedd;border-color:#cc8844}
.slot.p2{background:#ddffdd;border-color:#44aa44}
.slot.p3{background:#ffddee;border-color:#cc4488}
.slot.flipped{opacity:.7;border-style:dashed}

.merchant{position:absolute;background:rgba(255,215,100,0.9);border:1.5px solid #aa7700;border-radius:6px;padding:3px 6px;font-size:9px;font-weight:500;text-align:center;z-index:3;cursor:pointer;min-width:55px}
.merchant:hover{background:rgba(255,235,150,1)}
.merchant .mer-name{font-size:8px;color:#553300}

#markets{position:absolute;bottom:8px;left:8px;display:flex;gap:8px;z-index:5}
.market{background:rgba(255,255,255,0.95);border:1.5px solid #888;border-radius:8px;padding:6px;min-width:90px}

#sidebar{background:var(--color-background-primary,#fff);border-left:0.5px solid var(--color-border-tertiary);overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}

/* (everything else unchanged for brevity — your logic/UI remains identical) */

</style>
</head>

<body>
<div id="app">

<div id="header">
  <div style="font-size:16px;font-weight:500;letter-spacing:.05em">BRASS: BIRMINGHAM</div>
  <span id="era-badge" class="era-badge era-canal">Canal Era</span>
  <span id="round-info">Round <span id="round-num">1</span> / <span id="round-total">10</span></span>
</div>

<div id="main">

<div id="board-area">
  <div id="board">
    <canvas id="links-canvas" width="900" height="675"></canvas>

    <div id="markets">
      <div class="market" id="coal-market"><h3>Coal Market</h3></div>
      <div class="market" id="iron-market"><h3>Iron Market</h3></div>
    </div>
  </div>
</div>

<div id="sidebar">
  <!-- unchanged UI -->
</div>

</div>
</div>

<script>

/* =========================
   IMPORTANT BOARD SCALE FIX
   ========================= */

const BOARD_W = 900;
const BOARD_H = 675;

/* FIX DRAWING */
function drawLinks(){
  const canvas=document.getElementById('links-canvas');
  const ctx=canvas.getContext('2d');

  ctx.clearRect(0,0,BOARD_W,BOARD_H);

  CONNECTIONS.forEach(([a,b])=>{
    const la=LOCATIONS.find(l=>l.id===a),lb=LOCATIONS.find(l=>l.id===b);
    if(!la||!lb)return;
    ctx.beginPath();
    ctx.moveTo(la.x,la.y);
    ctx.lineTo(lb.x,lb.y);
    ctx.strokeStyle='rgba(255,255,255,0.15)';
    ctx.lineWidth=1;
    ctx.setLineDash([3,3]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  G.players.forEach(p=>{
    p.links.forEach(link=>{
      const la=LOCATIONS.find(l=>l.id===link.from),
            lb=LOCATIONS.find(l=>l.id===link.to);
      if(!la||!lb)return;

      ctx.beginPath();
      ctx.moveTo(la.x,la.y);
      ctx.lineTo(lb.x,lb.y);
      ctx.strokeStyle=PLAYER_COLORS[p.id];
      ctx.lineWidth=link.era==='rail'?3:2;
      ctx.stroke();
    });
  });

  /* CLICK MAP FIX */
  if(G.selectedAction==='network'&&G.pendingActionStep==='pick-location'){
    canvas.onclick=(e)=>{
      const rect=canvas.getBoundingClientRect();

      const mx=(e.clientX-rect.left)*(BOARD_W/rect.width);
      const my=(e.clientY-rect.top)*(BOARD_H/rect.height);

      let best=null,bestDist=22;

      CONNECTIONS.forEach(([a,b])=>{
        const la=LOCATIONS.find(l=>l.id===a),
              lb=LOCATIONS.find(l=>l.id===b);
        if(!la||!lb)return;

        const dx=lb.x-la.x,dy=lb.y-la.y;
        const len2=dx*dx+dy*dy;

        const t=Math.max(0,Math.min(1,((mx-la.x)*dx+(my-la.y)*dy)/len2));
        const px=la.x+t*dx,py=la.y+t*dy;

        const dist=Math.sqrt((mx-px)**2+(my-py)**2);
        if(dist<bestDist){bestDist=dist;best=[a,b];}
      });

      if(best)clickConnection(best[0],best[1]);
    };
  } else {
    canvas.onclick=null;
  }
}

</script>

</body>
</html>
